name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang libcap-dev libelf-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          # Automatically uses rust-toolchain.toml
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install bpf-linker & cargo-deb
        run: |
          cargo install bpf-linker
          cargo install cargo-deb

      - name: Build eBPF
        run: cargo xtask build-ebpf --release

      - name: Build NetMonitor Binary
        run: cargo build --package netmonitor --release

      - name: Build Debian Package
        run: |
          cd netmonitor
          cargo deb --no-build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/release/netmonitor
            target/debian/netmonitor_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
